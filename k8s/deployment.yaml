apiVersion: apps/v1
kind: Deployment
metadata:
  name: transpilation-api
  namespace: default
  labels:
    app: transpilation-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: transpilation-api
  template:
    metadata:
      labels:
        app: transpilation-api
        version: v1
    spec:
      containers:
      - name: api
        image: transpilation-api:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5